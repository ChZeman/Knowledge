# /etc/netplan/00-installer-config.yaml
# ignition-primary (10.250.2.101)
#
# Two NICs:
#   enp6s18          — department network 10.250.0.0/19  (metric 100, preferred)
#   enxc8a362a8bef1  — corporate network  10.15.144.0/24 (metric 200, fallback)
#
# Both NICs have a default route. The department network (metric 100) is preferred
# for internet traffic. The corporate network (metric 200) is used as fallback if
# the department internet is unavailable. Corporate VLAN clients reach Ignition
# via the corporate NIC regardless of metric.

network:
  version: 2
  renderer: networkd
  ethernets:
    enp6s18:
      dhcp4: false
      dhcp6: false
      accept-ra: false
      addresses:
        - 10.250.2.101/19
      nameservers:
        addresses:
          - 10.250.2.109
          - 10.250.2.209
        search:
          - localnet
      routes:
        - to: default
          via: 10.250.0.1
          metric: 100
    enxc8a362a8bef1:
      dhcp4: false
      dhcp6: false
      addresses:
        - 10.15.144.11/24
      routes:
        - to: default
          via: 10.15.144.1
          metric: 200
